<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoundSlot Login</title>
  <meta name="theme-color" content="#07164a">
  <link rel="preconnect" href="https://images.unsplash.com">
  <link rel="icon" href="assets/soundslot-logo.png" type="image/png">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="account-page">
  <header class="site-header">
    <a class="brand" href="index.html" aria-label="SoundSlot home">
      <img class="brand-logo" src="assets/soundslot-logo.png" alt="" aria-hidden="true">
      <span>SoundSlot</span>
    </a>
    <nav class="main-nav" aria-label="Main navigation">
      <a href="index.html#discover">Find lessons</a>
      <a href="index.html#bookings">My bookings</a>
      <a href="signup.html">Teach music</a>
      <a href="login.html">Login</a>
      <a href="account.html">Account</a>
      <a href="contact.html">Feedback</a>
      <a href="admin.html">Admin</a>
    </nav>
  </header>

  <main class="auth-shell">
    <section class="auth-copy">
      <p class="eyebrow">Student accounts</p>
      <h1>Sign up or log in to book lessons.</h1>
      <p>Your account keeps your bookings attached to one profile and lets the admin dashboard track real users.</p>
      <div class="success-message" id="currentUserPanel"></div>
    </section>

    <section class="auth-panel">
      <form class="feedback-form" id="signupForm">
        <div>
          <p class="eyebrow">New user</p>
          <h2>Create account</h2>
        </div>
        <label>
          Name
          <input type="text" id="signupName" required placeholder="Your name">
        </label>
        <label>
          Email
          <input type="email" id="signupEmail" required placeholder="you@example.com">
        </label>
        <label>
          Phone
          <input type="tel" id="signupPhone" placeholder="Optional">
        </label>
        <label>
          Password
          <input type="password" id="signupPassword" required minlength="4" placeholder="At least 4 characters">
        </label>
        <button type="submit">Create user account</button>
        <div class="success-message" id="signupMessage"></div>
      </form>

      <form class="feedback-form" id="loginForm">
        <div>
          <p class="eyebrow">Returning user</p>
          <h2>Log in</h2>
        </div>
        <label>
          Email
          <input type="email" id="loginEmail" required placeholder="you@example.com">
        </label>
        <label>
          Password
          <input type="password" id="loginPassword" required placeholder="Your password">
        </label>
        <button type="submit">Log in</button>
        <div class="form-actions">
          <button class="secondary-button" type="button" id="logoutButton">Log out</button>
        </div>
        <div class="success-message" id="loginMessage"></div>
      </form>
    </section>
  </main>

  <script src="app.js"></script>
  <script>
    const currentUserPanel = document.getElementById("currentUserPanel");
    const signupMessage = document.getElementById("signupMessage");
    const loginMessage = document.getElementById("loginMessage");

    function currentUser() {
      return JSON.parse(localStorage.getItem("soundslotCurrentUser") || "null");
    }

    function saveUser(user) {
      localStorage.setItem("soundslotCurrentUser", JSON.stringify(user));
      localStorage.setItem("soundslotFirstBookingAuthComplete", "true");
      renderCurrentUser();
    }

    function renderCurrentUser() {
      const user = currentUser();
      if (!user) {
        currentUserPanel.textContent = "No user is logged in on this browser.";
      } else {
        currentUserPanel.textContent = `Logged in as ${user.name} (${user.email}).`;
      }
      currentUserPanel.classList.add("is-visible");
    }

    async function createUser(payload) {
      const response = await fetch("/api/users", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      const data = await response.json();
      if (!response.ok) throw new Error(data.error || "Could not create account");
      return data.user;
    }

    async function loginUser(payload) {
      const response = await fetch("/api/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      const data = await response.json();
      if (!response.ok) throw new Error(data.error || "Could not log in");
      return data.user;
    }

    document.getElementById("signupForm").addEventListener("submit", async event => {
      event.preventDefault();
      try {
        const user = await createUser({
          name: document.getElementById("signupName").value,
          email: document.getElementById("signupEmail").value,
          phone: document.getElementById("signupPhone").value,
          password: document.getElementById("signupPassword").value
        });
        saveUser(user);
        signupMessage.textContent = "Account created and logged in.";
        signupMessage.classList.add("is-visible");
        event.target.reset();
      } catch (error) {
        signupMessage.textContent = error.message;
        signupMessage.classList.add("is-visible");
      }
    });

    document.getElementById("loginForm").addEventListener("submit", async event => {
      event.preventDefault();
      try {
        const user = await loginUser({
          email: document.getElementById("loginEmail").value,
          password: document.getElementById("loginPassword").value
        });
        saveUser(user);
        loginMessage.textContent = "Logged in successfully.";
        loginMessage.classList.add("is-visible");
        event.target.reset();
      } catch (error) {
        loginMessage.textContent = error.message;
        loginMessage.classList.add("is-visible");
      }
    });

    document.getElementById("logoutButton").addEventListener("click", () => {
      localStorage.removeItem("soundslotCurrentUser");
      loginMessage.textContent = "Logged out on this browser.";
      loginMessage.classList.add("is-visible");
      renderCurrentUser();
    });

    renderCurrentUser();
  </script>
</body>
</html>
